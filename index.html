<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阿里巴巴国际站规则中心 · 商家运营指南</title>
<style>
:root{
  --bg:#0a0e1a;--bg2:#0f1629;--card:rgba(15,23,42,0.7);--card-h:rgba(20,30,55,0.85);
  --glass:rgba(255,255,255,0.03);--gb:rgba(255,255,255,0.08);
  --pri:#38bdf8;--pri2:#818cf8;--ok:#34d399;--wn:#fbbf24;--err:#f87171;
  --t:#e2e8f0;--t2:#94a3b8;--t3:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(56,189,248,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.02) 1px,transparent 1px);background-size:60px 60px;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;top:-300px;right:-300px;width:800px;height:800px;background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,rgba(129,140,248,0.04) 40%,transparent 70%);border-radius:50%;z-index:0;pointer-events:none}
.wrap{max-width:1000px;margin:0 auto;padding:32px 24px 60px;position:relative;z-index:1}
.hero{border-radius:20px;padding:48px 40px;margin-bottom:32px;position:relative;overflow:hidden;border:1px solid var(--gb);background:linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9))}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 300px at 20% 80%,rgba(56,189,248,0.08),transparent),radial-gradient(ellipse 500px 250px at 80% 20%,rgba(129,140,248,0.08),transparent)}
.hero::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle 2px,rgba(56,189,248,0.2) 100%,transparent 100%),radial-gradient(circle 1.5px,rgba(129,140,248,0.15) 100%,transparent 100%);background-size:80px 80px,120px 120px;background-position:0 0,40px 40px;opacity:0.4}
.hero-content{position:relative;z-index:1}
.hero-badge{display:inline-block;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--pri);background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);border-radius:20px;padding:4px 16px;margin-bottom:16px}
.hero h1{font-size:32px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#e2e8f0 0%,#38bdf8 50%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:14px;color:var(--t2);max-width:600px;margin-bottom:20px}
.hero-stats{display:flex;gap:32px}
.hero-stat{text-align:center}
.hero-stat .num{font-size:28px;font-weight:700;color:var(--pri);display:block;line-height:1.2}
.hero-stat .label{font-size:11px;color:var(--t3);letter-spacing:0.5px}
.search-bar{display:flex;align-items:center;background:var(--card);border-radius:12px;padding:12px 18px;margin-bottom:24px;border:1px solid var(--gb);backdrop-filter:blur(10px);transition:border-color .3s}
.search-bar:focus-within{border-color:rgba(56,189,248,0.4);box-shadow:0 0 20px rgba(56,189,248,0.1)}
.search-bar svg{flex-shrink:0;color:var(--t3)}
.search-bar input{flex:1;border:none;outline:none;font-size:15px;padding:4px 14px;background:transparent;color:var(--t)}
.search-bar input::placeholder{color:var(--t3)}
.search-bar .clear{cursor:pointer;color:var(--t3);font-size:18px;padding:0 4px;display:none}
.search-bar .clear.show{display:block}
.quick-nav{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.quick-nav a{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:var(--glass);border-radius:8px;font-size:12px;color:var(--t2);text-decoration:none;border:1px solid var(--gb);transition:all .3s;white-space:nowrap}
.quick-nav a:hover{border-color:rgba(56,189,248,0.4);color:var(--pri);background:rgba(56,189,248,0.06);box-shadow:0 0 12px rgba(56,189,248,0.08)}
.quick-nav a .icon{font-size:14px}
.module{margin-bottom:36px}
.module-hd{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.module-hd .icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.module-hd h2{font-size:18px;font-weight:600;flex:1}
.module-hd .count{font-size:11px;color:var(--t3);background:rgba(255,255,255,0.04);padding:3px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
.ic-blue{background:rgba(56,189,248,0.12);color:var(--pri)}
.ic-purple{background:rgba(129,140,248,0.12);color:var(--pri2)}
.ic-green{background:rgba(52,211,153,0.12);color:var(--ok)}
.ic-orange{background:rgba(251,191,36,0.12);color:var(--wn)}
.ic-cyan{background:rgba(34,211,238,0.12);color:#22d3ee}
.ic-red{background:rgba(248,113,113,0.12);color:var(--err)}
.sub-hd{font-size:13px;font-weight:600;color:var(--t2);margin:18px 0 10px;padding-left:12px;border-left:3px solid var(--pri);display:flex;align-items:center;gap:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--gb);transition:all .3s;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;position:relative;backdrop-filter:blur(8px)}
.card:hover{border-color:rgba(56,189,248,0.3);box-shadow:0 4px 24px rgba(56,189,248,0.08),0 0 0 1px rgba(56,189,248,0.1);transform:translateY(-2px);background:var(--card-h)}
.card .card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card .card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card .card-logo{width:36px;height:36px;border-radius:10px;object-fit:contain;background:#fff;padding:3px;flex-shrink:0;box-shadow:0 0 8px rgba(56,189,248,0.2)}
.card .card-title{font-size:13px;font-weight:600;line-height:1.4;flex:1;color:var(--t)}
.card .card-desc{font-size:11px;color:var(--t3);line-height:1.5;flex:1}
.card .card-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--t3);opacity:0;transition:opacity .3s;font-size:14px}
.card:hover .card-arrow{opacity:1;color:var(--pri)}
.card .tag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;margin-top:6px;font-weight:600;letter-spacing:0.3px}
.tag-login{background:rgba(251,191,36,0.12);color:var(--wn);border:1px solid rgba(251,191,36,0.2)}
.tag-new{background:rgba(52,211,153,0.12);color:var(--ok);border:1px solid rgba(52,211,153,0.2)}
.tag-core{background:rgba(56,189,248,0.12);color:var(--pri);border:1px solid rgba(56,189,248,0.2)}
.module::before{content:'';display:block;height:2px;border-radius:2px}
.module.glow-blue::before{background:linear-gradient(90deg,var(--pri),transparent)}
.module.glow-purple::before{background:linear-gradient(90deg,var(--pri2),transparent)}
.module.glow-green::before{background:linear-gradient(90deg,var(--ok),transparent)}
.module.glow-cyan::before{background:linear-gradient(90deg,#22d3ee,transparent)}
.module.glow-red::before{background:linear-gradient(90deg,var(--err),transparent)}
.card.highlight{border-color:rgba(56,189,248,0.4);background:rgba(56,189,248,0.06)}
.card.dim{opacity:0.2}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px;display:none}
.foot{text-align:center;color:var(--t3);font-size:11px;margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.04);letter-spacing:0.3px}
@media(max-width:600px){.hero{padding:28px 20px}.hero h1{font-size:24px}.hero-stats{gap:16px}.hero-stat .num{font-size:22px}.cards{grid-template-columns:1fr}.quick-nav a{padding:5px 10px;font-size:11px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero"><div class="hero-content">
    <div class="hero-badge">Alibaba.com · Rules Center</div>
    <h1 id="heroTitle"></h1><p id="heroSubtitle"></p>
    <div class="hero-stats" id="heroStats"></div>
  </div></div>
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="搜索规则或关键词，如：AI、星等级、发品、海外现货…" />
    <span class="clear" id="clearBtn" onclick="clearSearch()">&times;</span>
  </div>
  <div class="quick-nav" id="quickNav"></div>
  <div id="modulesContainer"></div>
  <div class="empty" id="emptyState">没有找到匹配的规则，试试其他关键词？</div>
  <div class="foot" id="footer"></div>
</div>

const GLOW={"ic-blue":"glow-blue","ic-purple":"glow-purple","ic-green":"glow-green","ic-orange":"glow-blue","ic-cyan":"glow-cyan","ic-red":"glow-red"};

function logoFor(title){
  if(title.includes("Accio")||title.includes("AW "))return LOGOS.accio;
  if(title.includes("OKKI")||title.includes("小满"))return LOGOS.okki;
  return null;
}

async function loadData(){try{const r=await fetch("rules_data.json",{cache:"no-cache"});if(r.ok)return await r.json();}catch(e){}return FALLBACK_DATA;}

function renderPage(d){
  document.getElementById("heroTitle").textContent=d.title;
  document.getElementById("heroSubtitle").textContent=d.subtitle;
  const s=d.stats;
  document.getElementById("heroStats").innerHTML=[{n:s.modules,l:"核心模块"},{n:s.docs,l:"规则文档"},{n:s.platforms,l:"平台入口"}].map(x=>'<div class="hero-stat"><span class="num">'+x.n+'</span><span class="label">'+x.l+'</span></div>').join("");
  document.getElementById("quickNav").innerHTML=d.quick_nav.map(n=>'<a href="'+n.href+'"><span class="icon">'+n.icon+'</span>'+n.label+'</a>').join("");
  var mc=document.getElementById("modulesContainer");
  mc.innerHTML=d.modules.map(function(mod){
    var total=mod.subsections.reduce(function(s,sub){return s+sub.cards.length;},0);
    var glow=GLOW[mod.icon_color]||"glow-blue";
    var subs=mod.subsections.map(function(sub){
      var hd=sub.title?'<div class="sub-hd">'+sub.title+'</div>':'';
      var cards=sub.cards.map(renderCard).join("");
      return hd+'<div class="cards">'+cards+'</div>';
    }).join("");
    return '<div class="module '+glow+'"><div class="module-hd"><div class="icon '+mod.icon_color+'">'+mod.icon+'</div><h2>'+mod.title+'</h2><span class="count">'+total+' 条</span></div>'+subs+'</div>';
  }).join("");
  document.getElementById("footer").textContent=d.footer||"";
  setupSearch();setupNav();
}

function renderCard(c){
  var tag=c.tag?'<span class="tag '+c.tag.type+'">'+c.tag.text+'</span>':'';
  var logo=logoFor(c.title);
  var iconHtml;
  if(logo){
    iconHtml='<img class="card-logo" src="'+logo+'" alt="">';
  } else {
    iconHtml='<div class="card-icon '+c.icon_color+'">'+c.icon+'</div>';
  }
  return '<a class="card" href="'+c.url+'" target="'+(c.target||'_blank')+'" data-kw="'+(c.keywords||'')+'">'+
    '<div class="card-top">'+iconHtml+'<div class="card-title">'+c.title+'</div></div>'+
    '<div class="card-desc">'+c.desc+'</div>'+tag+
    '<span class="card-arrow">→</span></a>';
}

function setupSearch(){
  var input=document.getElementById("searchInput"),cb=document.getElementById("clearBtn");
  input.addEventListener("input",function(){
    var q=this.value.trim().toLowerCase();
    cb.classList.toggle("show",q.length>0);
    var cards=document.querySelectorAll(".card"),mods=document.querySelectorAll(".module"),empty=document.getElementById("emptyState");
    if(!q){cards.forEach(function(c){c.classList.remove("highlight","dim");c.style.display="";});mods.forEach(function(m){m.style.display="";});empty.style.display="none";return;}
    var kws=q.split(/\s+/),vis=0;
    cards.forEach(function(c){
      var t=(c.querySelector(".card-title").textContent+" "+c.querySelector(".card-desc").textContent+" "+(c.dataset.kw||"")).toLowerCase();
      var m=kws.every(function(k){return t.includes(k);});
      c.classList.toggle("highlight",m);c.classList.toggle("dim",!m);c.style.display=m?"":"none";if(m)vis++;
    });
    mods.forEach(function(m){m.style.display=m.querySelectorAll(".card:not(.dim)").length?"":"none";});
    empty.style.display=vis===0?"block":"none";
  });
}
function clearSearch(){var i=document.getElementById("searchInput");i.value="";i.dispatchEvent(new Event("input"));i.focus();}
function setupNav(){document.querySelectorAll(".quick-nav a").forEach(function(a){a.addEventListener("click",function(e){e.preventDefault();var t=document.querySelector(this.getAttribute("href"));if(t)t.scrollIntoView({behavior:"smooth",block:"start"});});});}
loadData().then(renderPage);
</script>
